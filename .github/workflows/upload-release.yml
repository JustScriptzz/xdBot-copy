name: Upload Release Assets
on:
  push:
    paths:
      - 'zilko_xdbot.geode'
      - 'zilko_xdbot.pdb'
  workflow_dispatch:
permissions:
  contents: write
jobs:
  upload:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Upload to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload latest zilko_xdbot.geode zilko_xdbot.pdb --repo ${{ github.repository }} --clobber
